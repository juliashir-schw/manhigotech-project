<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>הפרויקט שלי</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #bde0fe, #ffe5ec);
      margin: 0;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #ff4d6d;
      font-size: 42px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px white;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background-color: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.2s;
      border: 4px solid #ffd6a5;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .emoji {
      font-size: 40px;
      margin-left: 10px;
    }

    a {
      text-decoration: none;
      color: #0077b6;
      font-size: 26px;
      font-weight: bold;
    }

    a:hover {
      color: #ff006e;
    }

    p {
      color: #444;
      font-size: 18px;
      margin-top: 10px;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
